<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial Interaktif Green Computing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>Green Computing Labs</h1>
            <p>Eksperimen Mengirim Sinyal AM Lewat Interferensi Printer Mekanis</p>
        </header>

        <div class="visual-display">
            <div class="wave" id="wave-effect"></div>
            <div class="device printer-box"><span>🖨️</span> Printer Bekas</div>
            <div class="device radio-box" id="radio-element"><span>📻</span> Radio AM</div>
        </div>

        <div class="audio-status">
            <span>🔊</span> <em>Info: Klik tombol navigasi untuk mengaktifkan fitur simulasi suara radio.</em>
        </div>

        <div class="step-content">
            <span class="step-number" id="step-badge">Memuat...</span>
            <h2 class="step-title" id="step-title">Menyiapkan Sistem</h2>
            <p class="step-desc" id="step-desc">Tunggu sebentar...</p>
        </div>

        <div class="navigation">
            <button id="btn-prev" onclick="changeStep(-1)" disabled>Sebelumnya</button>
            <span class="indicator" id="step-indicator">1 / 3</span>
            <button id="btn-next" onclick="changeStep(1)">Selanjutnya</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
